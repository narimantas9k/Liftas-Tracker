<!DOCTYPE html>

<html lang="en" style="background:#0a0a0a">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="LIFT">
<meta name="theme-color" content="#0a0a0a">
<meta name="color-scheme" content="dark">
<title>LIFT — Workout Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #272727;
    --accent: #c8f135;
    --accent2: #ff4d4d;
    --text: #f0f0f0;
    --muted: #555;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

- { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html { overflow-x: hidden; max-width: 100vw; background: #0a0a0a; }

body {
background: #0a0a0a !important;
color: #f0f0f0 !important;
font-family: ‘DM Sans’, sans-serif;
min-height: 100dvh;
overflow-x: hidden;
max-width: 100vw;
-webkit-font-smoothing: antialiased;
}

a, button { color: inherit; }
:focus { outline: none; }
input, textarea, select { color: #f0f0f0 !important; background: #1a1a1a !important; -webkit-text-fill-color: #f0f0f0 !important; }

/* NAV */
.nav {
position: fixed;
bottom: 0;
left: 0;
right: 0;
background: rgba(10,10,10,0.96);
backdrop-filter: blur(20px);
border-top: 1px solid var(–border);
display: flex;
padding-bottom: var(–safe-bottom);
z-index: 100;
}

.nav-btn {
flex: 1;
padding: 14px 4px 12px;
display: flex;
flex-direction: column;
align-items: center;
gap: 5px;
background: none;
border: none;
color: var(–muted);
font-family: ‘DM Mono’, monospace;
font-size: 10px;
letter-spacing: 0.08em;
text-transform: uppercase;
cursor: pointer;
transition: color 0.15s;
}

.nav-btn.active { color: #c8f135 !important; }
.nav-btn svg { width: 26px; height: 26px; }

/* SCREENS */
.screen { display: none; padding: calc(var(–safe-top) + 90px) 16px calc(100px + var(–safe-bottom)); min-height: 100dvh; }
.screen.active { display: block; animation: fadeUp 0.2s ease; }
#screen-nutrition { padding-top: calc(var(–safe-top) + 80px); padding-bottom: calc(100px + var(–safe-bottom)); }

@keyframes fadeUp {
from { opacity: 0; transform: translateY(8px); }
to { opacity: 1; transform: translateY(0); }
}

/* TYPOGRAPHY */
.screen-title {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 48px;
line-height: 1;
letter-spacing: 0.02em;
margin-bottom: 4px;
}

.screen-sub {
font-family: ‘DM Mono’, monospace;
font-size: 11px;
color: var(–muted);
letter-spacing: 0.1em;
text-transform: uppercase;
margin-bottom: 24px;
}

/* CARDS */
.card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 12px;
padding: 16px;
margin-bottom: 12px;
}

.card-header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 12px;
}

.card-title {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 22px;
letter-spacing: 0.04em;
}

.tag {
font-family: ‘DM Mono’, monospace;
font-size: 9px;
letter-spacing: 0.1em;
text-transform: uppercase;
padding: 3px 8px;
border-radius: 4px;
background: var(–surface2);
color: var(–muted);
border: 1px solid var(–border);
}

.tag.strength { color: var(–accent); border-color: var(–accent); background: rgba(200,241,53,0.07); }
.tag.hypertrophy { color: #7eb8f7; border-color: #7eb8f7; background: rgba(126,184,247,0.07); }
.tag.pump { color: #f7a07e; border-color: #f7a07e; background: rgba(247,160,126,0.07); }

/* DAY SELECTOR */
.day-grid {
display: grid;
grid-template-columns: repeat(5, 1fr);
gap: 8px;
margin-bottom: 20px;
}

.day-btn {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 10px;
padding: 10px 4px;
display: flex;
flex-direction: column;
align-items: center;
gap: 2px;
cursor: pointer;
transition: all 0.15s;
}

.day-btn.active {
background: #c8f135 !important;
border-color: #c8f135 !important;
}

.day-btn-label {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 18px;
color: var(–muted);
transition: color 0.15s;
}

.day-btn.active .day-btn-label { color: #000; }

.day-btn-sub {
font-family: ‘DM Mono’, monospace;
font-size: 8px;
color: var(–muted);
text-transform: uppercase;
letter-spacing: 0.05em;
transition: color 0.15s;
text-align: center;
}

.day-btn.active .day-btn-sub { color: #000; }
.day-btn.has-log::after {
content: ‘’;
width: 4px;
height: 4px;
border-radius: 50%;
background: var(–accent);
display: block;
margin-top: 2px;
}
.day-btn.active.has-log::after { background: #000; }

/* EXERCISE LIST */
.exercise-block {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 12px;
margin-bottom: 10px;
overflow: hidden;
}

.exercise-header {
display: flex;
justify-content: space-between;
align-items: center;
padding: 14px 16px;
cursor: pointer;
}

.exercise-name {
font-weight: 500;
font-size: 15px;
}

.exercise-meta {
font-family: ‘DM Mono’, monospace;
font-size: 10px;
color: var(–muted);
margin-top: 2px;
}

.pr-badge {
font-family: ‘DM Mono’, monospace;
font-size: 9px;
color: var(–accent);
border: 1px solid var(–accent);
border-radius: 4px;
padding: 2px 6px;
letter-spacing: 0.05em;
}

.sets-area {
padding: 0 16px 14px;
display: none;
}

.sets-area.open { display: block; }

.set-row {
display: grid;
grid-template-columns: 28px 1fr 1fr auto;
gap: 8px;
align-items: center;
margin-bottom: 8px;
}

.set-num {
font-family: ‘DM Mono’, monospace;
font-size: 11px;
color: var(–muted);
text-align: center;
}

.set-input {
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 8px;
padding: 9px 10px;
color: var(–text);
font-family: ‘DM Mono’, monospace;
font-size: 14px;
text-align: center;
width: 100%;
outline: none;
transition: border-color 0.15s;
}

.set-input:focus { border-color: var(–accent); }
.set-input::placeholder { color: var(–muted); font-size: 11px; }

.set-done-btn {
width: 32px;
height: 32px;
border-radius: 8px;
border: 1px solid var(–border);
background: var(–surface2);
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
transition: all 0.15s;
flex-shrink: 0;
}

.set-done-btn.done { background: var(–accent); border-color: var(–accent); }
.set-done-btn svg { width: 14px; height: 14px; }

.set-input-labels {
display: grid;
grid-template-columns: 28px 1fr 1fr auto;
gap: 8px;
margin-bottom: 6px;
}

.set-label {
font-family: ‘DM Mono’, monospace;
font-size: 9px;
color: var(–muted);
text-transform: uppercase;
letter-spacing: 0.07em;
text-align: center;
}

.add-set-btn {
width: 100%;
padding: 8px;
background: none;
border: 1px dashed var(–border);
border-radius: 8px;
color: var(–muted);
font-family: ‘DM Mono’, monospace;
font-size: 11px;
letter-spacing: 0.05em;
cursor: pointer;
margin-top: 4px;
transition: all 0.15s;
}

.add-set-btn:hover { border-color: var(–accent); color: var(–accent); }

/* BUTTONS */
.btn {
width: 100%;
padding: 14px;
border-radius: 12px;
border: none;
font-family: ‘Bebas Neue’, sans-serif;
font-size: 20px;
letter-spacing: 0.08em;
cursor: pointer;
transition: all 0.15s;
}

.btn-primary { background: #c8f135 !important; color: #000 !important; }
.btn-primary:active { transform: scale(0.98); }
.btn-ghost { background: var(–surface); border: 1px solid var(–border); color: var(–text); }

/* STATS GRID */
.stats-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 10px;
margin-bottom: 12px;
}

.stat-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 12px;
padding: 16px;
}

.stat-val {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 36px;
line-height: 1;
color: var(–accent);
}

.stat-label {
font-family: ‘DM Mono’, monospace;
font-size: 9px;
color: var(–muted);
text-transform: uppercase;
letter-spacing: 0.08em;
margin-top: 4px;
}

/* WEIGHT LOG */
.weight-input-row {
display: flex;
gap: 10px;
margin-bottom: 16px;
}

.big-input {
flex: 1;
background: var(–surface);
border: 1px solid var(–border);
border-radius: 12px;
padding: 14px 16px;
color: var(–text);
font-family: ‘Bebas Neue’, sans-serif;
font-size: 28px;
outline: none;
transition: border-color 0.15s;
}

.big-input:focus { border-color: var(–accent); }
.big-input::placeholder { color: var(–muted); }

/* CHART */
.chart-wrap {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 12px;
padding: 16px;
margin-bottom: 12px;
}

canvas { width: 100% !important; }

/* LOG LIST */
.log-entry {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 10px;
padding: 12px 16px;
margin-bottom: 8px;
display: flex;
justify-content: space-between;
align-items: center;
}

.log-date {
font-family: ‘DM Mono’, monospace;
font-size: 11px;
color: var(–muted);
margin-top: 2px;
}

.log-weight {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 28px;
color: var(–accent);
}

/* PR LIST */
.pr-item {
display: flex;
justify-content: space-between;
align-items: center;
padding: 12px 0;
border-bottom: 1px solid var(–border);
}

.pr-item:last-child { border-bottom: none; }

.pr-name { font-size: 14px; font-weight: 500; }
.pr-val {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 22px;
color: var(–accent);
}

/* MACRO */
.macro-row {
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 8px;
margin-bottom: 8px;
}

.macro-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 10px;
padding: 10px 12px;
display: flex;
align-items: center;
justify-content: space-between;
gap: 8px;
}

.macro-card-left { text-align: left; flex: 1; }

.macro-val {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 26px;
line-height: 1;
}

.macro-label {
font-family: ‘DM Mono’, monospace;
font-size: 8px;
color: var(–muted);
text-transform: uppercase;
letter-spacing: 0.05em;
margin-top: 3px;
}

.macro-target {
font-family: ‘DM Mono’, monospace;
font-size: 8px;
color: var(–muted);
margin-top: 1px;
opacity: 0.7;
}

.macro-kcal { color: var(–accent); }
.macro-p { color: #7eb8f7; }
.macro-c { color: #f7a07e; }
.macro-f { color: #c4a0f7; }

.food-log-row {
display: flex;
gap: 8px;
margin-bottom: 8px;
}

.food-input {
flex: 1;
background: var(–surface);
border: 1px solid var(–border);
border-radius: 10px;
padding: 11px 14px;
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
font-size: 14px;
outline: none;
transition: border-color 0.15s;
}

.food-input:focus { border-color: var(–accent); }

.small-btn {
background: var(–accent);
border: none;
border-radius: 10px;
padding: 11px 16px;
font-family: ‘Bebas Neue’, sans-serif;
font-size: 16px;
color: #000;
cursor: pointer;
letter-spacing: 0.05em;
}

.food-entry {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 10px;
padding: 8px 12px;
margin-bottom: 5px;
display: flex;
justify-content: space-between;
align-items: center;
}

.food-name { font-size: 13px; }
.food-macros {
font-family: ‘DM Mono’, monospace;
font-size: 9px;
color: var(–muted);
margin-top: 1px;
}

.del-btn {
background: none;
border: none;
color: var(–muted);
cursor: pointer;
padding: 4px;
font-size: 16px;
line-height: 1;
}

/* PROGRESS BAR */
.progress-bar-wrap {
background: var(–surface2);
border-radius: 4px;
height: 4px;
margin-top: 6px;
overflow: hidden;
}

.progress-bar {
height: 100%;
border-radius: 4px;
transition: width 0.4s ease;
}

/* SECTION LABEL */
.section-label {
font-family: ‘DM Mono’, monospace;
font-size: 10px;
color: var(–muted);
text-transform: uppercase;
letter-spacing: 0.1em;
margin: 16px 0 8px;
}

.divider { height: 1px; background: var(–border); margin: 16px 0; }

/* TOAST */
.toast {
position: fixed;
bottom: calc(80px + var(–safe-bottom));
left: 50%;
transform: translateX(-50%) translateY(20px);
background: var(–accent);
color: #000;
font-family: ‘DM Mono’, monospace;
font-size: 12px;
letter-spacing: 0.05em;
padding: 10px 20px;
border-radius: 100px;
opacity: 0;
transition: all 0.3s;
z-index: 200;
white-space: nowrap;
}

.toast.show {
opacity: 1;
transform: translateX(-50%) translateY(0);
}

.empty-state {
text-align: center;
padding: 32px 0;
color: var(–muted);
font-family: ‘DM Mono’, monospace;
font-size: 12px;
letter-spacing: 0.05em;
}

/* SWAP MODAL */
.modal-backdrop {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.75);
z-index: 300;
display: flex;
align-items: flex-end;
animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

.modal-sheet {
background: #161616;
border-radius: 20px 20px 0 0;
padding: 20px 16px calc(40px + var(–safe-bottom));
width: 100%;
border-top: 1px solid #2a2a2a;
animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }

.modal-title { font-family:‘Bebas Neue’,sans-serif; font-size:20px; letter-spacing:0.04em; margin-bottom:4px; }
.modal-sub { font-family:‘DM Mono’,monospace; font-size:10px; color:var(–muted); margin-bottom:16px; text-transform:uppercase; letter-spacing:0.07em; }

.swap-option {
background: #1e1e1e;
border: 1px solid #2a2a2a;
border-radius: 10px;
padding: 13px 16px;
margin-bottom: 8px;
display: flex;
justify-content: space-between;
align-items: center;
cursor: pointer;
}
.swap-option:active { border-color: #c8f135; }
.swap-option-name { font-size: 15px; font-weight: 500; }
.swap-choose { font-family:‘DM Mono’,monospace; font-size:10px; color:#c8f135; letter-spacing:0.05em; }

.swap-cancel {
width: 100%;
margin-top: 8px;
padding: 13px;
background: none;
border: 1px solid #2a2a2a;
border-radius: 10px;
color: var(–muted);
font-family: ‘DM Mono’, monospace;
font-size: 12px;
cursor: pointer;
}

.swap-btn {
background: none;
border: 1px solid #2a2a2a;
border-radius: 6px;
color: var(–muted);
font-family: ‘DM Mono’, monospace;
font-size: 9px;
padding: 3px 7px;
cursor: pointer;
letter-spacing: 0.05em;
flex-shrink: 0;
}
.swap-btn:active { border-color: #c8f135; color: #c8f135; }
</style>

</head>

<script>

      { name: 'Seated Row', sets: 3, repsScheme: '10-12', variations: ['Wide Grip Cable Row', 'Machine Row', 'Chest-Supported Row'] },
      { name: 'Rear Delt Fly', sets: 3, repsScheme: '12-15', variations: ['Face Pull', 'Cable Rear Delt', 'Reverse Pec Deck'] },
      { name: 'Bicep Curl', sets: 3, repsScheme: '10-12', variations: ['Incline DB Curl', 'Cable Curl', 'EZ-Bar Curl'] },
      { name: 'Tricep Extension', sets: 3, repsScheme: '10-12', variations: ['Skull Crusher', 'Cable Pushdown', 'Bar Pushdown'] },
      { name: 'Hammer Curl', sets: 2, repsScheme: '10-12', variations: ['Cross-Body Hammer Curl', 'Cable Hammer Curl'] },
      { name: 'DB Overhead Tricep Ext', sets: 2, repsScheme: '10-12', variations: ['Cable Overhead Tricep Ext', 'EZ-Bar Overhead Ext', 'Skull Crusher'] },
      { name: 'Leg Curls (optional)', sets: 3, repsScheme: '12-15', variations: ['Nordic Curl', 'Swiss Ball Curl'] },
      { name: 'Leg Extensions (optional)', sets: 3, repsScheme: '12-15', variations: ['Sissy Squat'] },
    ]
  }
};

const DAYS = ['MON','TUE','WED','THU','FRI'];
const DAY_NAMES = { MON:'Mon', TUE:'Tue', WED:'Wed', THU:'Thu', FRI:'Fri' };

// ── STORAGE ───────────────────────────────────────────────────────────────────

function load(key) {
  try { return JSON.parse(localStorage.getItem(key)) || null; } catch { return null; }
}

function save(key, val) {
  localStorage.setItem(key, JSON.stringify(val));
}

function todayKey() {
  const d = new Date();
  return d.toISOString().split('T')[0];
}

function getWorkoutLog() { return load('workout_log') || {}; }
function saveWorkoutLog(log) { save('workout_log', log); }
function getWeightLog() { return load('weight_log') || []; }
function saveWeightLog(log) { save('weight_log', log); }
function getPRs() { return load('prs') || {}; }
function savePRs(prs) { save('prs', prs); }
function getNutritionLog() { return load('nutrition_log') || {}; }
function saveNutritionLog(log) { save('nutrition_log', log); }

// ── STATE ─────────────────────────────────────────────────────────────────────

let currentDay = null;
let openExercise = null;

// Detect today's day
function getTodayDayKey() {
  const d = new Date().getDay(); // 0=Sun
  const map = { 1:'MON', 2:'TUE', 3:'WED', 4:'THU', 5:'FRI' };
  return map[d] || 'MON';
}

// ── SCREEN SWITCH ─────────────────────────────────────────────────────────────

function switchScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'progress') renderProgress();
  if (name === 'history') renderHistory();
  if (name === 'nutrition') renderNutrition();
}

// ── WORKOUT ───────────────────────────────────────────────────────────────────

function initWorkout() {
  const today = getTodayDayKey();
  currentDay = today;
  renderDayGrid();
  renderWorkout();
}

function renderDayGrid() {
  const grid = document.getElementById('day-grid');
  const log = getWorkoutLog();
  grid.innerHTML = '';
  DAYS.forEach(day => {
    const hasLog = Object.keys(log).some(k => k.startsWith(todayKey().slice(0,7)) && log[k]?.day === day);
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (day === currentDay ? ' active' : '') + (hasLog ? ' has-log' : '');
    btn.innerHTML = `<span class="day-btn-label">${DAY_NAMES[day]}</span><span class="day-btn-sub">${SPLIT[day].label.split('+')[0].trim()}</span>`;
    btn.onclick = () => { currentDay = day; renderDayGrid(); renderWorkout(); };
    grid.appendChild(btn);
  });
}

function renderWorkout() {
  const day = SPLIT[currentDay];
  const content = document.getElementById('workout-content');
  const todaySub = document.getElementById('today-label');
  const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const d = new Date();
  todaySub.textContent = `${days[d.getDay()]} — ${d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}`;

  const log = getWorkoutLog();
  const key = todayKey() + '_' + currentDay;
  const savedSets = log[key]?.exercises || {};

  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:0.04em">${day.label}</div>
    </div>
    <span class="tag ${day.tag}">${day.tag}</span>
  </div>`;

  const swaps = load('exercise_swaps_' + todayKey() + '_' + currentDay) || {};

  day.exercises.forEach((ex, ei) => {
    const activeName = swaps[ei] || ex.name;
    const savedEx = savedSets[activeName] || { sets: [] };
    const prs = getPRs();
    const pr = prs[activeName];
    const prBadge = pr ? `<span class="pr-badge">PR ${pr.weight}kg×${pr.reps}</span>` : '';

    const setsCount = savedEx.sets.filter(s => s.done).length;
    const metaText = setsCount > 0 ? `${setsCount}/${ex.sets} sets done` : `${ex.sets} sets · ${ex.repsScheme} reps`;
    const isSwapped = swaps[ei] && swaps[ei] !== ex.name;
    const swapLabel = isSwapped ? `<span style="font-family:'DM Mono',monospace;font-size:8px;color:#c8f135;margin-left:6px">SWAP</span>` : '';

    html += `<div class="exercise-block" id="ex-${ei}">
      <div class="exercise-header" onclick="toggleExercise(${ei})">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px">
            <div class="exercise-name">${activeName}</div>${swapLabel}
          </div>
          <div class="exercise-meta">${metaText}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          ${ex.variations && ex.variations.length ? `<button class="swap-btn" onclick="event.stopPropagation();openSwap(${ei})">⇄ SWAP</button>` : ''}
          ${prBadge}
        </div>
      </div>
      <div class="sets-area" id="sets-${ei}">
        <div class="set-input-labels">
          <span class="set-label"></span>
          <span class="set-label">KG</span>
          <span class="set-label">REPS</span>
          <span class="set-label">✓</span>
        </div>`;

    const numSets = Math.max(ex.sets, savedEx.sets.length);
    for (let si = 0; si < numSets; si++) {
      const set = savedEx.sets[si] || { weight: '', reps: '', done: false };
      html += `<div class="set-row" id="setrow-${ei}-${si}" style="grid-template-columns:28px 1fr 1fr auto auto">
        <span class="set-num">${si+1}</span>
        <input class="set-input" type="number" inputmode="decimal" placeholder="kg" value="${set.weight}" onchange="updateSet(${ei},${si},'weight',this.value)">
        <input class="set-input" type="number" inputmode="decimal" placeholder="${ex.repsScheme}" value="${set.reps}" onchange="updateSet(${ei},${si},'reps',this.value)">
        <button class="set-done-btn ${set.done ? 'done' : ''}" onclick="toggleSetDone(${ei},${si})">
          <svg fill="${set.done ? '#000':'none'}" stroke="${set.done ? '#000':'currentColor'}" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
        </button>
        <button onclick="deleteSet(${ei},${si})" style="width:28px;height:32px;background:none;border:none;color:#444;font-size:16px;cursor:pointer;flex-shrink:0;line-height:1">×</button>
      </div>`;
    }

    html += `<button class="add-set-btn" onclick="addSet(${ei})">+ ADD SET</button>
      </div>
    </div>`;
  });

  html += `<button class="btn btn-primary" style="margin-top:16px" onclick="finishWorkout()">FINISH WORKOUT</button>`;
  content.innerHTML = html;
}

function toggleExercise(ei) {
  const area = document.getElementById('sets-' + ei);
  if (area.classList.contains('open')) {
    area.classList.remove('open');
    openExercise = null;
  } else {
    document.querySelectorAll('.sets-area').forEach(a => a.classList.remove('open'));
    area.classList.add('open');
    openExercise = ei;
  }
}

function getActiveName(ei) {
  const swaps = load('exercise_swaps_' + todayKey() + '_' + currentDay) || {};
  return swaps[ei] || SPLIT[currentDay].exercises[ei]?.name;
}

function getExerciseSets(ei) {
  const log = getWorkoutLog();
  const key = todayKey() + '_' + currentDay;
  if (!log[key]) log[key] = { day: currentDay, exercises: {} };
  const exName = getActiveName(ei);
  if (!log[key].exercises[exName]) log[key].exercises[exName] = { sets: [] };
  return { log, key, exName };
}

function openSwap(ei) {
  const ex = SPLIT[currentDay].exercises[ei];
  const swaps = load('exercise_swaps_' + todayKey() + '_' + currentDay) || {};
  const current = swaps[ei] || ex.name;
  const options = [ex.name, ...ex.variations];

  const modal = document.getElementById('swap-modal');
  modal.style.display = 'block';
  modal.innerHTML = `
    <div class="modal-backdrop" onclick="closeSwap()">
      <div class="modal-sheet" onclick="event.stopPropagation()">
        <div class="modal-title">SWAP EXERCISE</div>
        <div class="modal-sub">Currently: ${current}</div>
        ${options.map(opt => `
          <div class="swap-option" onclick="swapExercise(${ei}, '${opt.replace(/'/g, "\\'")}')">
            <span class="swap-option-name">${opt}</span>
            ${opt === current ? '<span style="font-family:\'DM Mono\',monospace;font-size:10px;color:var(--muted)">CURRENT</span>' : '<span class="swap-choose">SELECT</span>'}
          </div>
        `).join('')}
        <button class="swap-cancel" onclick="closeSwap()">CANCEL</button>
      </div>
    </div>`;
}

function closeSwap() {
  document.getElementById('swap-modal').style.display = 'none';
}

function swapExercise(ei, name) {
  const swapKey = 'exercise_swaps_' + todayKey() + '_' + currentDay;
  const swaps = load(swapKey) || {};
  swaps[ei] = name;
  save(swapKey, swaps);
  closeSwap();
  renderWorkout();
  showToast('⇄ Swapped to ' + name);
}

function updateSet(ei, si, field, val) {
  const { log, key, exName } = getExerciseSets(ei);
  while (log[key].exercises[exName].sets.length <= si) log[key].exercises[exName].sets.push({ weight: '', reps: '', done: false });
  log[key].exercises[exName].sets[si][field] = val;
  saveWorkoutLog(log);
}

function toggleSetDone(ei, si) {
  const { log, key, exName } = getExerciseSets(ei);
  while (log[key].exercises[exName].sets.length <= si) log[key].exercises[exName].sets.push({ weight: '', reps: '', done: false });
  const set = log[key].exercises[exName].sets[si];

  // Read current input values before toggling
  const row = document.getElementById('setrow-' + ei + '-' + si);
  if (row) {
    const inputs = row.querySelectorAll('.set-input');
    set.weight = inputs[0].value;
    set.reps = inputs[1].value;
  }

  // Block if reps not filled in
  if (!set.done && (!set.reps || parseFloat(set.reps) <= 0)) {
    showToast('⚠️ Enter reps first!');
    return;
  }

  set.done = !set.done;
  saveWorkoutLog(log);

  // Update PR
  if (set.done && set.weight && set.reps) {
    const prs = getPRs();
    const exName2 = SPLIT[currentDay].exercises[ei].name;
    if (!prs[exName2] || parseFloat(set.weight) > parseFloat(prs[exName2].weight)) {
      prs[exName2] = { weight: set.weight, reps: set.reps, date: todayKey() };
      savePRs(prs);
      showToast('🏆 NEW PR — ' + exName2);
    }
  }

  const btn = document.querySelector(`#setrow-${ei}-${si} .set-done-btn`);
  if (btn) {
    btn.classList.toggle('done', set.done);
    btn.innerHTML = `<svg fill="${set.done ? '#000':'none'}" stroke="${set.done ? '#000':'currentColor'}" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>`;
  }

  // Update meta
  const exDef = SPLIT[currentDay].exercises[ei];
  const doneSets = log[key].exercises[exName].sets.filter(s => s.done).length;
  const meta = document.querySelector(`#ex-${ei} .exercise-meta`);
  if (meta) meta.textContent = doneSets > 0 ? `${doneSets}/${exDef.sets} sets done` : `${exDef.sets} sets · ${exDef.repsScheme} reps`;
}

function addSet(ei) {
  const { log, key, exName } = getExerciseSets(ei);
  log[key].exercises[exName].sets.push({ weight: '', reps: '', done: false });
  saveWorkoutLog(log);
  renderWorkout();
  setTimeout(() => {
    document.querySelectorAll('.sets-area').forEach(a => a.classList.remove('open'));
    document.getElementById('sets-' + ei)?.classList.add('open');
  }, 10);
}

function deleteSet(ei, si) {
  const { log, key, exName } = getExerciseSets(ei);
  if (log[key].exercises[exName].sets.length <= 1) {
    showToast('⚠️ Need at least 1 set');
    return;
  }
  log[key].exercises[exName].sets.splice(si, 1);
  saveWorkoutLog(log);
  renderWorkout();
  setTimeout(() => {
    document.querySelectorAll('.sets-area').forEach(a => a.classList.remove('open'));
    document.getElementById('sets-' + ei)?.classList.add('open');
  }, 10);
}

function finishWorkout() {
  showToast('✓ Workout saved!');
  setTimeout(() => {
    switchScreen('history');
  }, 800);
}

function exportWorkout(key) {
  const log = getWorkoutLog();
  const entry = log[key];
  if (!entry) return;

  const dayInfo = SPLIT[entry.day];
  const dateStr = key.split('_')[0];
  const exNames = Object.keys(entry.exercises || {});

  text += `━━━━━━━━━━━━━━━━━━━━\n`;

      sets.forEach((s, i) => {
        text += `  Set ${i+1}: ${s.weight || '—'}kg × ${s.reps} reps\n`;

  text += `━━━━━━━━━━━━━━━━━━━━\n`;
  text += `Total: ${totalSets} sets completed\n`;

  navigator.clipboard.writeText(text).then(() => {
    showToast('📋 Copied! Paste into Claude for review');

    // Fallback: show in a modal
    const modal = document.getElementById('swap-modal');
    modal.style.display = 'block';
    modal.innerHTML = `
      <div class="modal-backdrop" onclick="closeSwap()">
        <div class="modal-sheet" onclick="event.stopPropagation()">
          <div class="modal-title">EXPORT WORKOUT</div>
          <div class="modal-sub">Long press → Select All → Copy → Paste into Claude</div>
          <textarea readonly style="width:100%;height:200px;background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:12px;color:#f0f0f0;font-family:'DM Mono',monospace;font-size:11px;resize:none">${text}</textarea>

```
      <button class="swap-cancel" onclick="closeSwap()">CLOSE</button>
    </div>
  </div>`;
```

});
}

text += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
text += `Paste this into Claude and ask for a weekly review!\n`;

navigator.clipboard.writeText(text).then(() => {
showToast(‘📋 Week copied! Paste into Claude’);
}).catch(() => {
const modal = document.getElementById(‘swap-modal’);
modal.style.display = ‘block’;
modal.innerHTML = ` <div class="modal-backdrop" onclick="closeSwap()"> <div class="modal-sheet" onclick="event.stopPropagation()"> <div class="modal-title">WEEKLY EXPORT</div> <div class="modal-sub">Long press → Select All → Copy → Paste into Claude</div> <textarea readonly style="width:100%;height:240px;background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:12px;color:#f0f0f0;font-family:'DM Mono',monospace;font-size:10px;resize:none">${text}</textarea> <button class="swap-cancel" onclick="closeSwap()">CLOSE</button> </div> </div>`;
});
}

// ── PROGRESS ──────────────────────────────────────────────────────────────────

function logWeight() {
const val = parseFloat(document.getElementById(‘weight-input’).value);
if (!val) return;
const log = getWeightLog();
log.push({ date: todayKey(), weight: val });
saveWeightLog(log);
document.getElementById(‘weight-input’).value = ‘’;
showToast(’Weight logged: ’ + val + ‘kg’);
renderProgress();
}

function renderProgress() {
const log = getWeightLog();

// Stats
if (log.length > 0) {
const latest = log[log.length - 1].weight;
document.getElementById(‘stat-current’).textContent = latest + ‘kg’;
if (log.length > 1) {
const prev = log[log.length - 2].weight;
const diff = (latest - prev).toFixed(1);
const el = document.getElementById(‘stat-delta’);
el.textContent = (diff > 0 ? ‘+’ : ‘’) + diff + ‘kg’;
el.style.color = diff > 0 ? ‘var(–accent2)’ : ‘var(–accent)’;
}
}

// Chart
const recent = log.slice(-30);
const canvas = document.getElementById(‘weight-chart’);
if (!canvas || recent.length < 2) return;
const ctx = canvas.getContext(‘2d’);
const W = canvas.offsetWidth || 300;
const H = 120;
canvas.width = W * window.devicePixelRatio;
canvas.height = H * window.devicePixelRatio;
ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

const vals = recent.map(e => e.weight);
const min = Math.min(…vals) - 1;
const max = Math.max(…vals) + 1;
const pad = { left: 40, right: 10, top: 10, bottom: 20 };
const cW = W - pad.left - pad.right;
const cH = H - pad.top - pad.bottom;

ctx.clearRect(0, 0, W, H);

// Grid
ctx.strokeStyle = ‘#222’;
ctx.lineWidth = 1;
[0, 0.5, 1].forEach(f => {
const y = pad.top + cH * (1 - f);
ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
ctx.fillStyle = ‘#555’;
ctx.font = ‘9px DM Mono, monospace’;
ctx.fillText((min + (max - min) * f).toFixed(1), 2, y + 3);
});

// Line
const xPos = i => pad.left + (i / (recent.length - 1)) * cW;
const yPos = v => pad.top + cH * (1 - (v - min) / (max - min));

ctx.beginPath();
recent.forEach((e, i) => {
const x = xPos(i), y = yPos(e.weight);
i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
});
ctx.strokeStyle = ‘#c8f135’;
ctx.lineWidth = 2;
ctx.stroke();

// Dots
recent.forEach((e, i) => {
ctx.beginPath();
ctx.arc(xPos(i), yPos(e.weight), 3, 0, Math.PI * 2);
ctx.fillStyle = ‘#c8f135’;
ctx.fill();
});

// PRs
const prs = getPRs();
const prList = document.getElementById(‘pr-list’);
if (Object.keys(prs).length === 0) {
prList.innerHTML = ‘<div class="empty-state">No PRs yet — start lifting!</div>’;
return;
}
prList.innerHTML = Object.entries(prs).map(([name, pr]) =>
`<div class="pr-item"> <div> <div class="pr-name">${name}</div> <div class="log-date">${pr.date}</div> </div> <div class="pr-val">${pr.weight}kg × ${pr.reps}</div> </div>`
).join(’’);
}

// ── NUTRITION ─────────────────────────────────────────────────────────────────

// Per-day targets from master_plan_v4 — aggressive cut + muscle retention
const DAY_TARGETS = {
MON: { kcal: 2700, p: 195, c: 295, f: 70 },  // Chest + Tris — heavy day
TUE: { kcal: 2700, p: 195, c: 295, f: 70 },  // Back + Bis — heavy day
WED: { kcal: 2800, p: 200, c: 320, f: 72 },  // Legs — biggest session
THU: { kcal: 2600, p: 185, c: 270, f: 68 },  // Shoulders + Chest
FRI: { kcal: 2600, p: 185, c: 270, f: 68 },  // Arms + Back
SAT: { kcal: 2300, p: 185, c: 200, f: 65 },  // Rest
SUN: { kcal: 2300, p: 185, c: 200, f: 65 },  // Rest
};

function getTodayTargets() {
const dayKeys = [‘SUN’,‘MON’,‘TUE’,‘WED’,‘THU’,‘FRI’,‘SAT’];
const key = dayKeys[new Date().getDay()];
return DAY_TARGETS[key] || DAY_TARGETS[‘MON’];
}

function addFood() {
const name = document.getElementById(‘food-name’).value.trim();
const kcal = parseFloat(document.getElementById(‘food-kcal’).value) || 0;
const p = parseFloat(document.getElementById(‘food-p’).value) || 0;
const c = parseFloat(document.getElementById(‘food-c’).value) || 0;
const fat = parseFloat(document.getElementById(‘food-fat’).value) || 0;
if (!name) return;

const log = getNutritionLog();
if (!log[todayKey()]) log[todayKey()] = [];
log[todayKey()].push({ name, kcal, p, c, fat, id: Date.now() });
saveNutritionLog(log);

[‘food-name’,‘food-kcal’,‘food-p’,‘food-c’,‘food-fat’].forEach(id => document.getElementById(id).value = ‘’);
renderNutrition();
}

function deleteFood(id) {
const log = getNutritionLog();
if (log[todayKey()]) log[todayKey()] = log[todayKey()].filter(f => f.id !== id);
saveNutritionLog(log);
renderNutrition();
}

function renderNutrition() {
const log = getNutritionLog();
const today = log[todayKey()] || [];

const totals = today.reduce((acc, f) => ({
kcal: acc.kcal + f.kcal,
p: acc.p + f.p,
c: acc.c + f.c,
fat: acc.fat + f.fat
}), { kcal: 0, p: 0, c: 0, fat: 0 });

const TARGETS = getTodayTargets();

document.getElementById(‘m-kcal’).textContent = Math.round(totals.kcal);
document.getElementById(‘m-p’).textContent = Math.round(totals.p) + ‘g’;
document.getElementById(‘m-c’).textContent = Math.round(totals.c) + ‘g’;
document.getElementById(‘m-f’).textContent = Math.round(totals.fat) + ‘g’;

// Update macro card subtitles with targets
document.getElementById(‘t-kcal’).textContent = ’of ’ + TARGETS.kcal;
document.getElementById(‘t-p’).textContent = ’of ’ + TARGETS.p + ‘g’;
document.getElementById(‘t-c’).textContent = ’of ’ + TARGETS.c + ‘g’;
document.getElementById(‘t-f’).textContent = ’of ’ + TARGETS.f + ‘g’;

document.getElementById(‘pb-kcal’).style.width = Math.min(100, totals.kcal / TARGETS.kcal * 100) + ‘%’;
document.getElementById(‘pb-p’).style.width = Math.min(100, totals.p / TARGETS.p * 100) + ‘%’;
document.getElementById(‘pb-c’).style.width = Math.min(100, totals.c / TARGETS.c * 100) + ‘%’;
document.getElementById(‘pb-f’).style.width = Math.min(100, totals.fat / TARGETS.f * 100) + ‘%’;

// Color progress bars red if over target
const bars = [
{ bar: ‘pb-kcal’, val: totals.kcal, target: TARGETS.kcal, col: ‘var(–accent)’ },
{ bar: ‘pb-p’,    val: totals.p,    target: TARGETS.p,    col: ‘#7eb8f7’ },
{ bar: ‘pb-c’,    val: totals.c,    target: TARGETS.c,    col: ‘#f7a07e’ },
{ bar: ‘pb-f’,    val: totals.fat,  target: TARGETS.f,    col: ‘#c4a0f7’ },
];
bars.forEach(({ bar, val, target, col }) => {
document.getElementById(bar).style.background = val > target ? ‘var(–accent2)’ : col;
});

const d = new Date();
document.getElementById(‘nutrition-date’).textContent = d.toLocaleDateString(‘en-GB’,{weekday:‘long’,day:‘numeric’,month:‘long’}).toUpperCase();

const list = document.getElementById(‘food-list’);
if (today.length === 0) {
list.innerHTML = ‘<div class="empty-state">Nothing logged yet</div>’;
return;
}
list.innerHTML = today.map(f =>
`<div class="food-entry"> <div> <div class="food-name">${f.name}</div> <div class="food-macros">${f.kcal}kcal · P${f.p}g · C${f.c}g · F${f.fat}g</div> </div> <button class="del-btn" onclick="deleteFood(${f.id})">×</button> </div>`
).join(’’);
}

// ── HISTORY ───────────────────────────────────────────────────────────────────

function renderHistory() {
const log = getWorkoutLog();
const list = document.getElementById(‘history-list’);
const keys = Object.keys(log).sort().reverse();
if (keys.length === 0) {
list.innerHTML = ‘<div class="empty-state">No workouts logged yet</div>’;
return;
}

// Weekly export button at top
let html = `<button onclick="exportWeek()" style="width:100%;padding:13px;background:#1a1a1a;border:1px solid #c8f135;border-radius:12px;color:#c8f135;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:0.08em;cursor:pointer;margin-bottom:14px"> 📋 EXPORT WEEK FOR CLAUDE REVIEW </button>`;

html += keys.map(key => {
const entry = log[key];
const dayInfo = SPLIT[entry.day];
const exNames = Object.keys(entry.exercises || {});
const totalSets = exNames.reduce((acc, name) => acc + (entry.exercises[name].sets.filter(s => s.done).length), 0);
const dateStr = key.split(’_’)[0];
return `<div class="card"> <div class="card-header"> <div> <div class="card-title">${dayInfo?.label || entry.day}</div> <div class="log-date">${dateStr}</div> </div> <div style="display:flex;align-items:center;gap:8px"> <span class="tag ${dayInfo?.tag || ''}">${totalSets} sets</span> <button onclick="exportWorkout('${key}')" style="background:none;border:1px solid #333;border-radius:6px;color:#888;font-family:'DM Mono',monospace;font-size:9px;padding:3px 8px;cursor:pointer;letter-spacing:0.05em">COPY</button> </div> </div> <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);line-height:1.8"> ${exNames.map(name => { const sets = entry.exercises[name].sets.filter(s => s.done); return sets.length ? `<span style="color:var(--text)">${name}</span> — ${sets.map(s => `${s.weight}kg×${s.reps}`).join(’, ‘)}` : ''; }).filter(Boolean).join('<br>')} </div> </div>`;
}).join(’’);

list.innerHTML = html;
}

function showToast(msg) {
const t = document.getElementById(‘toast’);
t.textContent = msg;
t.classList.add(‘show’);
setTimeout(() => t.classList.remove(‘show’), 2500);
}

initWorkout();
