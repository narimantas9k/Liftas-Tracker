<!DOCTYPE html>
<html lang="en" style="background:#0a0a0a">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="LIFT">
<meta name="theme-color" content="#0a0a0a">
<meta name="color-scheme" content="dark">
<title>LIFT — Workout Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #272727;
    --accent: #c8f135;
    --accent2: #ff4d4d;
    --text: #f0f0f0;
    --muted: #555;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html { overflow-x: hidden; max-width: 100vw; background: #0a0a0a; }

  body {
    background: #0a0a0a !important;
    color: #f0f0f0 !important;
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh;
    overflow-x: hidden;
    max-width: 100vw;
    -webkit-font-smoothing: antialiased;
  }

  a, button { color: inherit; }
  :focus { outline: none; }
  input, textarea, select { color: #f0f0f0 !important; background: #1a1a1a !important; -webkit-text-fill-color: #f0f0f0 !important; }

  /* NAV */
  .nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(10,10,10,0.96);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    padding-bottom: var(--safe-bottom);
    z-index: 100;
  }

  .nav-btn {
    flex: 1;
    padding: 14px 4px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.15s;
  }

  .nav-btn.active { color: #c8f135 !important; }
  .nav-btn svg { width: 26px; height: 26px; }

  /* SCREENS */
  .screen { display: none; padding: calc(var(--safe-top) + 90px) 16px calc(100px + var(--safe-bottom)); min-height: 100dvh; }
  .screen.active { display: block; animation: fadeUp 0.2s ease; }
  #screen-nutrition { padding-top: calc(var(--safe-top) + 80px); padding-bottom: calc(100px + var(--safe-bottom)); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* TYPOGRAPHY */
  .screen-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    line-height: 1;
    letter-spacing: 0.02em;
    margin-bottom: 4px;
  }

  .screen-sub {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.04em;
  }

  .tag {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .tag.strength { color: var(--accent); border-color: var(--accent); background: rgba(200,241,53,0.07); }
  .tag.hypertrophy { color: #7eb8f7; border-color: #7eb8f7; background: rgba(126,184,247,0.07); }
  .tag.pump { color: #f7a07e; border-color: #f7a07e; background: rgba(247,160,126,0.07); }

  /* DAY SELECTOR */
  .day-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }

  .day-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .day-btn.active {
    background: #c8f135 !important;
    border-color: #c8f135 !important;
  }

  .day-btn-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: var(--muted);
    transition: color 0.15s;
  }

  .day-btn.active .day-btn-label { color: #000; }

  .day-btn-sub {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    transition: color 0.15s;
    text-align: center;
  }

  .day-btn.active .day-btn-sub { color: #000; }
  .day-btn.has-log::after {
    content: '';
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--accent);
    display: block;
    margin-top: 2px;
  }
  .day-btn.active.has-log::after { background: #000; }

  /* EXERCISE LIST */
  .exercise-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
  }

  .exercise-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    cursor: pointer;
  }

  .exercise-name {
    font-weight: 500;
    font-size: 15px;
  }

  .exercise-meta {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  .pr-badge {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 4px;
    padding: 2px 6px;
    letter-spacing: 0.05em;
  }

  .sets-area {
    padding: 0 16px 14px;
    display: none;
  }

  .sets-area.open { display: block; }

  .set-row {
    display: grid;
    grid-template-columns: 28px 1fr 1fr auto;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }

  .set-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
  }

  .set-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    text-align: center;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
  }

  .set-input:focus { border-color: var(--accent); }
  .set-input::placeholder { color: var(--muted); font-size: 11px; }

  .set-done-btn {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .set-done-btn.done { background: var(--accent); border-color: var(--accent); }
  .set-done-btn svg { width: 14px; height: 14px; }

  .set-input-labels {
    display: grid;
    grid-template-columns: 28px 1fr 1fr auto;
    gap: 8px;
    margin-bottom: 6px;
  }

  .set-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    text-align: center;
  }

  .add-set-btn {
    width: 100%;
    padding: 8px;
    background: none;
    border: 1px dashed var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    cursor: pointer;
    margin-top: 4px;
    transition: all 0.15s;
  }

  .add-set-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* BUTTONS */
  .btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-primary { background: #c8f135 !important; color: #000 !important; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-ghost { background: var(--surface); border: 1px solid var(--border); color: var(--text); }

  /* STATS GRID */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }

  .stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    line-height: 1;
    color: var(--accent);
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 4px;
  }

  /* WEIGHT LOG */
  .weight-input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }

  .big-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    outline: none;
    transition: border-color 0.15s;
  }

  .big-input:focus { border-color: var(--accent); }
  .big-input::placeholder { color: var(--muted); }

  /* CHART */
  .chart-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }

  canvas { width: 100% !important; }

  /* LOG LIST */
  .log-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .log-date {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .log-weight {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--accent);
  }

  /* PR LIST */
  .pr-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }

  .pr-item:last-child { border-bottom: none; }

  .pr-name { font-size: 14px; font-weight: 500; }
  .pr-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--accent);
  }

  /* MACRO */
  .macro-row {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-bottom: 8px;
  }

  .macro-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .macro-card-left { text-align: left; flex: 1; }

  .macro-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    line-height: 1;
  }

  .macro-label {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 3px;
  }

  .macro-target {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    color: var(--muted);
    margin-top: 1px;
    opacity: 0.7;
  }

  .macro-kcal { color: var(--accent); }
  .macro-p { color: #7eb8f7; }
  .macro-c { color: #f7a07e; }
  .macro-f { color: #c4a0f7; }

  .food-log-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }

  .food-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }

  .food-input:focus { border-color: var(--accent); }

  .small-btn {
    background: var(--accent);
    border: none;
    border-radius: 10px;
    padding: 11px 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    color: #000;
    cursor: pointer;
    letter-spacing: 0.05em;
  }

  .food-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
    margin-bottom: 5px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .food-name { font-size: 13px; }
  .food-macros {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    margin-top: 1px;
  }

  .del-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 4px;
    font-size: 16px;
    line-height: 1;
  }

  /* PROGRESS BAR */
  .progress-bar-wrap {
    background: var(--surface2);
    border-radius: 4px;
    height: 4px;
    margin-top: 6px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* SECTION LABEL */
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin: 16px 0 8px;
  }

  .divider { height: 1px; background: var(--border); margin: 16px 0; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: calc(80px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #000;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
    padding: 10px 20px;
    border-radius: 100px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 200;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .empty-state {
    text-align: center;
    padding: 32px 0;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
  }

  /* SWAP MODAL */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 300;
    display: flex;
    align-items: flex-end;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

  .modal-sheet {
    background: #161616;
    border-radius: 20px 20px 0 0;
    padding: 20px 16px calc(40px + var(--safe-bottom));
    width: 100%;
    border-top: 1px solid #2a2a2a;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }

  .modal-title { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:0.04em; margin-bottom:4px; }
  .modal-sub { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); margin-bottom:16px; text-transform:uppercase; letter-spacing:0.07em; }

  .swap-option {
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 13px 16px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
  }
  .swap-option:active { border-color: #c8f135; }
  .swap-option-name { font-size: 15px; font-weight: 500; }
  .swap-choose { font-family:'DM Mono',monospace; font-size:10px; color:#c8f135; letter-spacing:0.05em; }

  .swap-cancel {
    width: 100%;
    margin-top: 8px;
    padding: 13px;
    background: none;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
  }

  .swap-btn {
    background: none;
    border: 1px solid #2a2a2a;
    border-radius: 6px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    padding: 3px 7px;
    cursor: pointer;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }
  .swap-btn:active { border-color: #c8f135; color: #c8f135; }
</style>
</head>
<body>

<!-- SCREENS -->

<!-- WORKOUT SCREEN -->
<div class="screen active" id="screen-workout">
  <div class="screen-title">TODAY</div>
  <div class="screen-sub" id="today-label">Loading...</div>

  <div class="day-grid" id="day-grid"></div>

  <div id="workout-content"></div>
</div>

<!-- PROGRESS SCREEN -->
<div class="screen" id="screen-progress">
  <div class="screen-title">PROGRESS</div>
  <div class="screen-sub">BODYWEIGHT & PRs</div>

  <div class="weight-input-row">
    <input class="big-input" id="weight-input" type="number" step="0.1" placeholder="91.0" inputmode="decimal">
    <button class="small-btn" onclick="logWeight()">LOG</button>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-val" id="stat-current">—</div>
      <div class="stat-label">Current kg</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="stat-delta">—</div>
      <div class="stat-label">vs Last Week</div>
    </div>
  </div>

  <div class="chart-wrap">
    <div class="section-label">30-Day Weight</div>
    <canvas id="weight-chart" height="120"></canvas>
  </div>

  <div class="section-label">Personal Records</div>
  <div class="card" id="pr-list"></div>
</div>

<!-- NUTRITION SCREEN -->
<div class="screen" id="screen-nutrition">
  <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
    <div class="screen-title" style="font-size:36px">FUEL</div>
    <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)" id="nutrition-date"></div>
  </div>

  <!-- 2x2 macro grid, fully fluid -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">

    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px">
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase">Calories</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--accent);line-height:1.1" id="m-kcal">0</div>
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:5px" id="t-kcal">of —</div>
      <div style="background:var(--surface2);border-radius:4px;height:4px;overflow:hidden"><div id="pb-kcal" style="height:100%;border-radius:4px;background:var(--accent);width:0%;transition:width 0.4s"></div></div>
    </div>

    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px">
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase">Protein</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:#7eb8f7;line-height:1.1" id="m-p">0g</div>
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:5px" id="t-p">of —</div>
      <div style="background:var(--surface2);border-radius:4px;height:4px;overflow:hidden"><div id="pb-p" style="height:100%;border-radius:4px;background:#7eb8f7;width:0%;transition:width 0.4s"></div></div>
    </div>

    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px">
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase">Carbs</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:#f7a07e;line-height:1.1" id="m-c">0g</div>
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:5px" id="t-c">of —</div>

    History

<div class="toast" id="toast"></div>

<!-- SWAP MODAL -->
<div id="swap-modal" style="display:none"></div>

<script>
var SPLIT = {
  MON: { label: 'Chest + Tris', tag: 'strength', exercises: [
    { name: 'Bench Press', sets: 4, repsScheme: '4-6', variations: ['Flat DB Press', 'Smith Bench', 'Floor Press'] },
    { name: 'Incline DB Press', sets: 3, repsScheme: '6-8', variations: ['Incline Barbell', 'Incline Smith', 'Low-to-High Cable Press'] },
    { name: 'Cable Fly', sets: 3, repsScheme: '12-15', variations: ['Pec Deck', 'DB Flat Fly', 'Machine Fly', 'High-to-Low Cable Fly', 'Low-to-High Cable Fly'] },
    { name: 'Dips', sets: 3, repsScheme: '6-8', variations: ['Assisted Dip Machine', 'Close-Grip Bench Press'] },
    { name: 'Tricep Pushdown', sets: 3, repsScheme: '10-12', variations: ['Rope Pushdown', 'Bar Pushdown', 'Overhead Cable Tricep Ext'] }
  ]},
  TUE: { label: 'Back + Bis', tag: 'strength', exercises: [
    { name: 'Deadlift', sets: 3, repsScheme: '3-5', variations: ['Romanian DL', 'Trap Bar DL', 'Rack Pull'] },
    { name: 'Weighted Pull-Ups', sets: 4, repsScheme: '4-6', variations: ['Assisted Pull-Up', 'Cable Pullover', 'Lat Pulldown'] },
    { name: 'Barbell Row', sets: 3, repsScheme: '5-6', variations: ['Pendlay Row', 'T-Bar Row', 'Seal Row', 'DB Row'] },
    { name: 'Barbell Curl', sets: 3, repsScheme: '8-10', variations: ['EZ-Bar Curl', 'Preacher Curl', 'Cable Curl'] },
    { name: 'Hammer Curl', sets: 3, repsScheme: '8-10', variations: ['Incline DB Curl', 'Cross-Body Hammer Curl', 'Cable Hammer Curl', 'Preacher Curl'] }
  ]},
  WED: { label: 'Legs', tag: 'strength', exercises: [
    { name: 'Back Squat', sets: 4, repsScheme: '4-6', variations: ['Hack Squat', 'Front Squat', 'Smith Machine Squat'] },
    { name: 'Romanian Deadlift', sets: 3, repsScheme: '6-8', variations: ['Stiff-Leg DL', 'Good Morning', 'Nordic Curl'] },
    { name: 'Leg Press', sets: 3, repsScheme: '10-12', variations: ['Hack Squat Machine', 'Bulgarian Split Squat'] },
    { name: 'Leg Extension', sets: 3, repsScheme: '12-15', variations: ['Sissy Squat', 'Terminal Knee Extension'] },
    { name: 'Hamstring Curl', sets: 3, repsScheme: '12-15', variations: ['Nordic Curl', 'Swiss Ball Curl', 'RDL light'] },
    { name: 'Hip Thrust', sets: 3, repsScheme: '10-12', variations: ['Glute Bridge', 'Single-Leg Hip Thrust', 'Cable Pull-Through', 'Smith Machine Hip Thrust', 'Banded Hip Thrust'] },
    { name: 'Calves', sets: 4, repsScheme: '12-15', variations: ['Seated Calf Raise', 'Donkey Calf', 'Single-Leg Calf Raise'] }
  ]},
  THU: { label: 'Shoulders + Chest', tag: 'hypertrophy', exercises: [
    { name: 'DB Shoulder Press', sets: 3, repsScheme: '8-12', variations: ['Barbell OHP', 'Smith OHP', 'Machine Shoulder Press'] },
    { name: 'Lateral Raises', sets: 4, repsScheme: '12-15', variations: ['Cable Lateral Raise', 'Machine Lateral Raise'] },
    { name: 'Machine Lateral Raises', sets: 3, repsScheme: '12-15', variations: ['Cable Lateral Raise', 'DB Lateral Raise'] },
    { name: 'Face Pull', sets: 3, repsScheme: '15-20', variations: ['Reverse Pec Deck', 'Band Pull-Apart', 'Cable Rear Delt Fly', 'Seated Rear Delt Fly', 'TRX Rear Delt Row'] },
    { name: 'Incline Machine Press', sets: 3, repsScheme: '10-12', variations: ['Incline Smith Press', 'Incline DB Press'] },
    { name: 'Cable Fly', sets: 3, repsScheme: '12-15', variations: ['Pec Deck', 'Machine Fly', 'DB Flat Fly'] }
  ]},
  FRI: { label: 'Arms + Back', tag: 'hypertrophy', exercises: [
    { name: 'Bicep Curl  SS-A', sets: 3, repsScheme: '10-12', variations: ['Incline DB Curl', 'Cable Curl', 'EZ-Bar Curl'], superset: 'A' },
    { name: 'Tricep Extension  SS-A', sets: 3, repsScheme: '10-12', variations: ['Skull Crusher', 'Cable Pushdown', 'Bar Pushdown'], superset: 'A' },
    { name: 'Hammer Curl  SS-B', sets: 2, repsScheme: '10-12', variations: ['Cross-Body Hammer Curl', 'Cable Hammer Curl', 'Incline DB Curl'], superset: 'B' },
    { name: 'DB Overhead Tricep Ext  SS-B', sets: 2, repsScheme: '10-12', variations: ['Single-Arm DB Overhead Tricep Ext', 'Cable Overhead Tricep Ext', 'EZ-Bar Overhead Ext', 'Skull Crusher', 'Tricep Pushdown'], superset: 'B' },
    { name: 'Lat Pulldown', sets: 3, repsScheme: '10-12', variations: ['Wide Grip Pulldown', 'Reverse Grip Pulldown', 'Cable Pullover'] },
    { name: 'Seated Row', sets: 3, repsScheme: '10-12', variations: ['Wide Grip Cable Row', 'Machine Row', 'Chest-Supported Row'] },
    { name: 'Rear Delt Fly', sets: 3, repsScheme: '12-15', variations: ['Face Pull', 'Cable Rear Delt', 'Reverse Pec Deck'] },
    { name: 'Leg Curls (optional)', sets: 3, repsScheme: '12-15', variations: ['Nordic Curl', 'Swiss Ball Curl'] },
    { name: 'Leg Extensions (optional)', sets: 3, repsScheme: '12-15', variations: ['Sissy Squat'] }
  ]}
};

var DAYS = ['MON','TUE','WED','THU','FRI'];
var DAY_NAMES = { MON:'Mon', TUE:'Tue', WED:'Wed', THU:'Thu', FRI:'Fri' };
var currentDay = 'MON';

var DAY_TARGETS = {
  MON: { kcal: 2700, p: 195, c: 295, f: 70 },
  TUE: { kcal: 2700, p: 195, c: 295, f: 70 },
  WED: { kcal: 2800, p: 200, c: 320, f: 72 },
  THU: { kcal: 2600, p: 185, c: 270, f: 68 },
  FRI: { kcal: 2600, p: 185, c: 270, f: 68 },
  SAT: { kcal: 2300, p: 185, c: 200, f: 65 },
  SUN: { kcal: 2300, p: 185, c: 200, f: 65 }
};

function load(key) { try { return JSON.parse(localStorage.getItem(key)) || null; } catch(e) { return null; } }
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
function todayKey() { return new Date().toISOString().split('T')[0]; }
function getWorkoutLog() { return load('workout_log') || {}; }
function saveWorkoutLog(l) { save('workout_log', l); }
function getWeightLog() { return load('weight_log') || []; }
function saveWeightLog(l) { save('weight_log', l); }
function getPRs() { return load('prs') || {}; }
function savePRs(p) { save('prs', p); }
function getNutritionLog() { return load('nutrition_log') || {}; }
function saveNutritionLog(l) { save('nutrition_log', l); }

function getTodayDayKey() {
  var map = { 1:'MON', 2:'TUE', 3:'WED', 4:'THU', 5:'FRI' };
  return map[new Date().getDay()] || 'MON';
}

function getTodayTargets() {
  var keys = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  return DAY_TARGETS[keys[new Date().getDay()]] || DAY_TARGETS.MON;
}

function switchScreen(name) {
  var ss = document.querySelectorAll('.screen');
  for (var i = 0; i < ss.length; i++) ss[i].classList.remove('active');
  var nb = document.querySelectorAll('.nav-btn');
  for (var i = 0; i < nb.length; i++) nb[i].classList.remove('active');
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'progress') renderProgress();
  if (name === 'history') renderHistory();
  if (name === 'nutrition') renderNutrition();
}

function initWorkout() {
  currentDay = getTodayDayKey();
  renderDayGrid();
  renderWorkout();
}

function renderDayGrid() {
  var grid = document.getElementById('day-grid');
  var log = getWorkoutLog();
  var month = todayKey().slice(0, 7);
  grid.innerHTML = '';
  DAYS.forEach(function(day) {
    var hasLog = Object.keys(log).some(function(k) { return k.startsWith(month) && log[k] && log[k].day === day; });
    var btn = document.createElement('button');
    btn.className = 'day-btn' + (day === currentDay ? ' active' : '') + (hasLog ? ' has-log' : '');
    btn.innerHTML = '<span class="day-btn-label">' + DAY_NAMES[day] + '</span><span class="day-btn-sub">' + SPLIT[day].label.split('+')[0].trim() + '</span>';
    btn.onclick = (function(d) { return function() { currentDay = d; renderDayGrid(); renderWorkout(); }; })(day);
    grid.appendChild(btn);
  });
}

function getActiveName(ei) {
  var swaps = load('swaps_' + todayKey() + '_' + currentDay) || {};
  return swaps[ei] || SPLIT[currentDay].exercises[ei].name;
}

function renderWorkout() {
  var day = SPLIT[currentDay];
  var content = document.getElementById('workout-content');
  var sub = document.getElementById('today-label');
  var dn = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  var d = new Date();
  sub.textContent = dn[d.getDay()] + ' - ' + d.toLocaleDateString('en-GB', {day:'numeric', month:'short'});

  var log = getWorkoutLog();
  var key = todayKey() + '_' + currentDay;
  var savedSets = (log[key] && log[key].exercises) ? log[key].exercises : {};
  var swaps = load('swaps_' + todayKey() + '_' + currentDay) || {};
  var prs = getPRs();
  var html = '';

  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
  html += '<div style="font-family:Bebas Neue,sans-serif;font-size:26px">' + day.label + '</div>';
  html += '<span class="tag ' + day.tag + '">' + day.tag + '</span></div>';

  day.exercises.forEach(function(ex, ei) {
    var activeName = swaps[ei] || ex.name;
    var savedEx = savedSets[activeName] || { sets: [] };
    var pr = prs[activeName];
    var done = savedEx.sets.filter(function(s) { return s.done; }).length;
    var meta = done > 0 ? (done + '/' + ex.sets + ' sets done') : (ex.sets + ' sets - ' + ex.repsScheme + ' reps');
    var swapped = swaps[ei] && swaps[ei] !== ex.name;

    // Parse superset tag from name e.g. "Bicep Curl  SS-A" -> displayName="Bicep Curl", ssTag="A"
    var ssMatch = ex.name.match(/\s+SS-([A-Z])$/);
    var displayName = activeName.replace(/\s+SS-[A-Z]$/, '');
    var ssTag = ssMatch ? ssMatch[1] : null;
    var ssColors = { A: '#c8f135', B: '#7eb8f7', C: '#f7a07e' };
    var ssColor = ssTag ? (ssColors[ssTag] || '#c8f135') : null;

    html += '<div class="exercise-block" id="ex-' + ei + '">';
    html += '<div class="exercise-header" onclick="toggleExercise(' + ei + ')">';
    html += '<div style="flex:1;min-width:0">';
    html += '<div style="display:flex;align-items:center;gap:6px">';
    html += '<div class="exercise-name">' + displayName + '</div>';
    if (ssTag) html += '<span style="font-size:9px;font-family:monospace;font-weight:bold;color:#000;background:' + ssColor + ';padding:1px 5px;border-radius:4px">SS-' + ssTag + '</span>';
    if (swapped) html += '<span style="font-size:8px;color:#c8f135;font-family:monospace">SWAP</span>';
    html += '</div><div class="exercise-meta">' + meta + '</div></div>';
    html += '<div style="display:flex;align-items:center;gap:8px;flex-shrink:0">';
    if (ex.variations && ex.variations.length) {
      html += '<button class="swap-btn" onclick="event.stopPropagation();openSwap(' + ei + ')">swap</button>';
    }
    if (pr) html += '<span class="pr-badge">PR ' + pr.weight + 'kg x' + pr.reps + ' (' + (pr.oneRM || '?') + ')</span>';
    html += '</div></div>';

    html += '<div class="sets-area" id="sets-' + ei + '">';
    html += '<div class="set-input-labels"><span class="set-label"></span><span class="set-label">KG</span><span class="set-label">REPS</span><span class="set-label"></span><span class="set-label"></span></div>';

    var numSets = Math.max(ex.sets, savedEx.sets.length);
    for (var si = 0; si < numSets; si++) {
      var set = savedEx.sets[si] || { weight: '', reps: '', done: false };
      var fc = set.done ? '#000' : 'none';
      var sc = set.done ? '#000' : 'currentColor';
      var dc = set.done ? ' done' : '';
      html += '<div class="set-row" id="setrow-' + ei + '-' + si + '" style="grid-template-columns:28px 1fr 1fr auto auto">';
      html += '<span class="set-num">' + (si + 1) + '</span>';
      html += '<input class="set-input" type="number" inputmode="decimal" placeholder="kg" value="' + (set.weight || '') + '" onchange="updateSet(' + ei + ',' + si + ',this.value,\'w\')">';
      html += '<input class="set-input" type="number" inputmode="decimal" placeholder="' + ex.repsScheme + '" value="' + (set.reps || '') + '" onchange="updateSet(' + ei + ',' + si + ',this.value,\'r\')">';
      html += '<button class="set-done-btn' + dc + '" onclick="toggleSetDone(' + ei + ',' + si + ')">';
      html += '<svg fill="' + fc + '" stroke="' + sc + '" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>';
      html += '</button>';
      html += '<button onclick="deleteSet(' + ei + ',' + si + ')" style="width:28px;height:32px;background:none;border:none;color:#555;font-size:18px;cursor:pointer;line-height:1">x</button>';
      html += '</div>';
    }
    html += '<button class="add-set-btn" onclick="addSet(' + ei + ')">+ ADD SET</button>';
    html += '</div></div>';
  });

  html += '<button class="btn btn-primary" style="margin-top:16px" onclick="finishWorkout()">FINISH WORKOUT</button>';
  content.innerHTML = html;
}

function toggleExercise(ei) {
  var area = document.getElementById('sets-' + ei);
  var areas = document.querySelectorAll('.sets-area');
  if (area.classList.contains('open')) {
    area.classList.remove('open');
  } else {
    for (var i = 0; i < areas.length; i++) areas[i].classList.remove('open');
    area.classList.add('open');
  }
}

function getExSets(ei) {
  var log = getWorkoutLog();
  var key = todayKey() + '_' + currentDay;
  if (!log[key]) log[key] = { day: currentDay, exercises: {} };
  var name = getActiveName(ei);
  if (!log[key].exercises[name]) log[key].exercises[name] = { sets: [] };
  return { log: log, key: key, name: name };
}

function updateSet(ei, si, val, field) {
  var r = getExSets(ei);
  while (r.log[r.key].exercises[r.name].sets.length <= si) {
    r.log[r.key].exercises[r.name].sets.push({ weight: '', reps: '', done: false });
  }
  if (field === 'w') r.log[r.key].exercises[r.name].sets[si].weight = val;
  else r.log[r.key].exercises[r.name].sets[si].reps = val;
  saveWorkoutLog(r.log);
}

function toggleSetDone(ei, si) {
  var r = getExSets(ei);
  while (r.log[r.key].exercises[r.name].sets.length <= si) {
    r.log[r.key].exercises[r.name].sets.push({ weight: '', reps: '', done: false });
  }
  var set = r.log[r.key].exercises[r.name].sets[si];
  var row = document.getElementById('setrow-' + ei + '-' + si);
  if (row) {
    var inputs = row.querySelectorAll('.set-input');
    set.weight = inputs[0].value;
    set.reps = inputs[1].value;
  }
  if (!set.done && (!set.reps || parseFloat(set.reps) <= 0)) {
    showToast('Enter reps first!');
    return;
  }
  set.done = !set.done;
  saveWorkoutLog(r.log);

    if (set.done && set.weight && set.reps) {
    var prs = getPRs();
    var nm = getActiveName(ei);
    var w = parseFloat(set.weight);
    var r = parseFloat(set.reps);
    var new1RM = Math.round(w * (1 + r / 30) * 10) / 10;
    var old1RM = prs[nm] ? Math.round(parseFloat(prs[nm].weight) * (1 + parseFloat(prs[nm].reps) / 30) * 10) / 10 : 0;
    if (new1RM > old1RM) {
      prs[nm] = { weight: set.weight, reps: set.reps, oneRM: new1RM, date: todayKey() };
      savePRs(prs);
      showToast('NEW PR - ' + nm + ' (' + new1RM + 'kg 1RM)');
    }
  }

  var btn = document.querySelector('#setrow-' + ei + '-' + si + ' .set-done-btn');
  if (btn) {
    btn.classList.toggle('done', set.done);
    var fc = set.done ? '#000' : 'none';
    var sc = set.done ? '#000' : 'currentColor';
    btn.innerHTML = '<svg fill="' + fc + '" stroke="' + sc + '" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>';
  }

  var exDef = SPLIT[currentDay].exercises[ei];
  var doneSets = r.log[r.key].exercises[r.name].sets.filter(function(s) { return s.done; }).length;
  var meta = document.querySelector('#ex-' + ei + ' .exercise-meta');
  if (meta) meta.textContent = doneSets > 0 ? (doneSets + '/' + exDef.sets + ' sets done') : (exDef.sets + ' sets - ' + exDef.repsScheme + ' reps');
}

function addSet(ei) {
  var r = getExSets(ei);
  r.log[r.key].exercises[r.name].sets.push({ weight: '', reps: '', done: false });
  saveWorkoutLog(r.log);
  renderWorkout();
  setTimeout(function() {
    var areas = document.querySelectorAll('.sets-area');
    for (var i = 0; i < areas.length; i++) areas[i].classList.remove('open');
    var a = document.getElementById('sets-' + ei);
    if (a) a.classList.add('open');
  }, 10);
}

function deleteSet(ei, si) {
  var r = getExSets(ei);
  if (r.log[r.key].exercises[r.name].sets.length <= 1) { showToast('Need at least 1 set'); return; }
  r.log[r.key].exercises[r.name].sets.splice(si, 1);
  saveWorkoutLog(r.log);
  renderWorkout();
  setTimeout(function() {
    var areas = document.querySelectorAll('.sets-area');
    for (var i = 0; i < areas.length; i++) areas[i].classList.remove('open');
    var a = document.getElementById('sets-' + ei);
    if (a) a.classList.add('open');
  }, 10);
}

function finishWorkout() {
  showToast('Workout saved!');
  setTimeout(function() { switchScreen('history'); }, 800);
}

function openSwap(ei) {
  var ex = SPLIT[currentDay].exercises[ei];
  var swaps = load('swaps_' + todayKey() + '_' + currentDay) || {};
  var current = swaps[ei] || ex.name;
  var options = [ex.name].concat(ex.variations || []);
  var html = '<div class="modal-backdrop" onclick="closeSwap()">';
  html += '<div class="modal-sheet" onclick="event.stopPropagation()">';
  html += '<div class="modal-title">SWAP EXERCISE</div>';
  html += '<div class="modal-sub">Currently: ' + current + '</div>';
  options.forEach(function(opt, idx) {
    html += '<div class="swap-option" onclick="doSwap(' + ei + ',' + idx + ')">';
    html += '<span class="swap-option-name">' + opt + '</span>';
    html += opt === current ? '<span style="font-size:10px;color:#555">NOW</span>' : '<span class="swap-choose">USE</span>';
    html += '</div>';
  });
  html += '<button class="swap-cancel" onclick="closeSwap()">CANCEL</button>';
  html += '</div></div>';
  var modal = document.getElementById('swap-modal');
  modal.style.display = 'block';
  modal.innerHTML = html;
  window._swapOptions = options;
}

function doSwap(ei, idx) {
  var name = window._swapOptions[idx];
  var swapKey = 'swaps_' + todayKey() + '_' + currentDay;
  var swaps = load(swapKey) || {};
  swaps[ei] = name;
  save(swapKey, swaps);
  closeSwap();
  renderWorkout();
  showToast('Swapped to ' + name);
}

function closeSwap() {
  document.getElementById('swap-modal').style.display = 'none';
}

function logWeight() {
  var val = parseFloat(document.getElementById('weight-input').value);
  if (!val) return;
  var log = getWeightLog();
  log.push({ date: todayKey(), weight: val });
  saveWeightLog(log);
  document.getElementById('weight-input').value = '';
  showToast('Weight: ' + val + 'kg logged');
  renderProgress();
}

function renderProgress() {
  var log = getWeightLog();
  if (log.length > 0) {
    var latest = log[log.length - 1].weight;
    document.getElementById('stat-current').textContent = latest + 'kg';
    if (log.length > 1) {
      var diff = (latest - log[log.length - 2].weight).toFixed(1);
      var el = document.getElementById('stat-delta');
      el.textContent = (diff > 0 ? '+' : '') + diff + 'kg';
      el.style.color = diff > 0 ? '#ff4d4d' : '#c8f135';
    }
  }

  var recent = log.slice(-30);
  var canvas = document.getElementById('weight-chart');
  if (canvas && recent.length >= 2) {
    var ctx = canvas.getContext('2d');
    var W = canvas.offsetWidth || 300;
    var H = 120;
    canvas.width = W * window.devicePixelRatio;
    canvas.height = H * window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    var vals = recent.map(function(e) { return e.weight; });
    var mn = Math.min.apply(null, vals) - 1;
    var mx = Math.max.apply(null, vals) + 1;
    var pl = 40, pr = 10, pt = 10, pb = 20;
    var cW = W - pl - pr, cH = H - pt - pb;
    ctx.clearRect(0, 0, W, H);
    [0, 0.5, 1].forEach(function(f) {
      var y = pt + cH * (1 - f);
      ctx.strokeStyle = '#222'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(pl, y); ctx.lineTo(W - pr, y); ctx.stroke();
      ctx.fillStyle = '#555'; ctx.font = '9px monospace';
      ctx.fillText((mn + (mx - mn) * f).toFixed(1), 2, y + 3);
    });
    var xp = function(i) { return pl + (i / (recent.length - 1)) * cW; };
    var yp = function(v) { return pt + cH * (1 - (v - mn) / (mx - mn)); };
    ctx.beginPath();
    recent.forEach(function(e, i) { i === 0 ? ctx.moveTo(xp(i), yp(e.weight)) : ctx.lineTo(xp(i), yp(e.weight)); });
    ctx.strokeStyle = '#c8f135'; ctx.lineWidth = 2; ctx.stroke();
    recent.forEach(function(e, i) {
      ctx.beginPath(); ctx.arc(xp(i), yp(e.weight), 3, 0, Math.PI * 2);
      ctx.fillStyle = '#c8f135'; ctx.fill();
    });
  }

  var prs = getPRs();
  var prList = document.getElementById('pr-list');
  if (!prList) return;
  if (!Object.keys(prs).length) { prList.innerHTML = '<div class="empty-state">No PRs yet</div>'; return; }
  var html = '';
  Object.keys(prs).forEach(function(name) {
    var pr = prs[name];
    html += '<div class="pr-item"><div><div class="pr-name">' + name + '</div><div class="log-date">' + pr.date + '</div></div>';
    html += '<div class="pr-val">' + pr.weight + 'kg x ' + pr.reps + '</div>';
    html += '<div style="font-family:monospace;font-size:10px;color:#c8f135;text-align:right">~' + (pr.oneRM || '?') + 'kg 1RM</div>';
    html += '</div>';
  });
  prList.innerHTML = html;
}

function addFood() {
  var name = document.getElementById('food-name').value.trim();
  var kcal = parseFloat(document.getElementById('food-kcal').value) || 0;
  var p = parseFloat(document.getElementById('food-p').value) || 0;
  var c = parseFloat(document.getElementById('food-c').value) || 0;
  var fat = parseFloat(document.getElementById('food-fat').value) || 0;
  if (!name) return;
  var log = getNutritionLog();
  if (!log[todayKey()]) log[todayKey()] = [];
  log[todayKey()].push({ name: name, kcal: kcal, p: p, c: c, fat: fat, id: Date.now() });
  saveNutritionLog(log);
  ['food-name','food-kcal','food-p','food-c','food-fat'].forEach(function(id) { document.getElementById(id).value = ''; });
  renderNutrition();
}

function deleteFood(id) {
  var log = getNutritionLog();
  if (log[todayKey()]) log[todayKey()] = log[todayKey()].filter(function(f) { return f.id !== id; });
  saveNutritionLog(log);
  renderNutrition();
}

function renderNutrition() {
  var log = getNutritionLog();
  var today = log[todayKey()] || [];
  var tot = today.reduce(function(a, f) { return { kcal: a.kcal+f.kcal, p: a.p+f.p, c: a.c+f.c, fat: a.fat+f.fat }; }, { kcal:0, p:0, c:0, fat:0 });
  var T = getTodayTargets();
  document.getElementById('m-kcal').textContent = Math.round(tot.kcal);
  document.getElementById('m-p').textContent = Math.round(tot.p) + 'g';
  document.getElementById('m-c').textContent = Math.round(tot.c) + 'g';
  document.getElementById('m-f').textContent = Math.round(tot.fat) + 'g';
  document.getElementById('t-kcal').textContent = 'of ' + T.kcal;
  document.getElementById('t-p').textContent = 'of ' + T.p + 'g';
  document.getElementById('t-c').textContent = 'of ' + T.c + 'g';
  document.getElementById('t-f').textContent = 'of ' + T.f + 'g';
  var bars = [
    { id:'pb-kcal', val:tot.kcal, target:T.kcal, col:'#c8f135' },
    { id:'pb-p', val:tot.p, target:T.p, col:'#7eb8f7' },
    { id:'pb-c', val:tot.c, target:T.c, col:'#f7a07e' },
    { id:'pb-f', val:tot.fat, target:T.f, col:'#c4a0f7' }
  ];
  bars.forEach(function(b) {
    var el = document.getElementById(b.id);
    el.style.width = Math.min(100, b.val / b.target * 100) + '%';
    el.style.background = b.val > b.target ? '#ff4d4d' : b.col;
  });
  var d = new Date();
  document.getElementById('nutrition-date').textContent = d.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'}).toUpperCase();
  var list = document.getElementById('food-list');
  if (!today.length) { list.innerHTML = '<div class="empty-state">Nothing logged yet</div>'; return; }
  var html = '';
  today.forEach(function(f) {
    html += '<div class="food-entry"><div>';
    html += '<div class="food-name">' + f.name + '</div>';
    html += '<div class="food-macros">' + f.kcal + 'kcal - P' + f.p + 'g - C' + f.c + 'g - F' + f.fat + 'g</div>';
    html += '</div><button class="del-btn" onclick="deleteFood(' + f.id + ')">x</button></div>';
  });
  list.innerHTML = html;
}

function exportWorkout(key) {
  var log = getWorkoutLog();
  var entry = log[key];
  if (!entry) return;
  var dayInfo = SPLIT[entry.day];
  var dateStr = key.split('_')[0];
  var exNames = Object.keys(entry.exercises || {});
  var lines = ['LIFT WORKOUT LOG', '--------------------', 'Date: ' + dateStr, 'Session: ' + (dayInfo ? dayInfo.label : entry.day), '--------------------', ''];
  exNames.forEach(function(name) {
    var sets = entry.exercises[name].sets.filter(function(s) { return s.done; });
    if (sets.length) {
      lines.push(name);
      sets.forEach(function(s, i) { lines.push('  Set ' + (i+1) + ': ' + (s.weight||'?') + 'kg x ' + s.reps + ' reps'); });
      lines.push('');
    }
  });
  var total = exNames.reduce(function(a, n) { return a + entry.exercises[n].sets.filter(function(s) { return s.done; }).length; }, 0);
  lines.push('Total: ' + total + ' sets');
  copyToClipboard(lines.join('\n'), 'Copied! Paste into Claude for review');
}

function exportWeek() {
  var log = getWorkoutLog();
  var keys = Object.keys(log).sort().reverse().slice(0, 7);
  if (!keys.length) { showToast('No workouts logged yet'); return; }
  var lines = ['LIFT WEEKLY SUMMARY', '-----------------------------', ''];
  keys.forEach(function(key) {
    var entry = log[key];
    var dayInfo = SPLIT[entry.day];
    var dateStr = key.split('_')[0];
    var exNames = Object.keys(entry.exercises || {});
    var total = exNames.reduce(function(a, n) { return a + entry.exercises[n].sets.filter(function(s) { return s.done; }).length; }, 0);
    lines.push(dateStr + ' - ' + (dayInfo ? dayInfo.label : entry.day));
    exNames.forEach(function(name) {
      var sets = entry.exercises[name].sets.filter(function(s) { return s.done; });
      if (sets.length) {
        lines.push('  ' + name + ': ' + sets.map(function(s) { return (s.weight||'?') + 'kg x ' + s.reps; }).join(' | '));
      }
    });
    lines.push('  Total: ' + total + ' sets');
    lines.push('');
  });
  lines.push('Paste into Claude and ask for a weekly review!');
  copyToClipboard(lines.join('\n'), 'Week copied! Paste into Claude');
}

function copyToClipboard(text, msg) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() { showToast(msg); }).catch(function() { showTextModal(text); });
  } else {
    showTextModal(text);
  }
}

function showTextModal(text) {
  var modal = document.getElementById('swap-modal');
  modal.style.display = 'block';
  modal.innerHTML = '<div class="modal-backdrop" onclick="closeSwap()">'
    + '<div class="modal-sheet" onclick="event.stopPropagation()">'
    + '<div class="modal-title">EXPORT</div>'
    + '<div class="modal-sub">Long press inside box, Select All, Copy</div>'
    + '<textarea readonly style="width:100%;height:220px;background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:12px;color:#f0f0f0;font-family:monospace;font-size:10px;resize:none">' + text + '</textarea>'
    + '<button class="swap-cancel" onclick="closeSwap()">CLOSE</button>'
    + '</div></div>';
}

function renderNutritionHistory() {
  var log = getNutritionLog();
  var list = document.getElementById('nutrition-history-list');
  var today = new Date();
  var html = '';
  var found = false;

  // Export buttons at top
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">';
  html += '<button onclick="exportNutritionWeek()" style="padding:11px;background:#1a1a1a;border:1px solid #c8f135;border-radius:10px;color:#c8f135;font-family:Bebas Neue,sans-serif;font-size:15px;letter-spacing:0.06em;cursor:pointer">EXPORT WEEK</button>';
  html += '<button onclick="exportNutritionFull()" style="padding:11px;background:#1a1a1a;border:1px solid #7eb8f7;border-radius:10px;color:#7eb8f7;font-family:Bebas Neue,sans-serif;font-size:15px;letter-spacing:0.06em;cursor:pointer">EXPORT 14 DAYS</button>';
  html += '</div>';

  for (var i = 0; i < 14; i++) {
    var d = new Date(today);
    d.setDate(today.getDate() - i);
    var dateKey = d.toISOString().split('T')[0];
    var dayName = d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
    var foods = log[dateKey] || [];

    // Calculate day's totals
    var tot = foods.reduce(function(a, f) {
      return { kcal: a.kcal + f.kcal, p: a.p + f.p, c: a.c + f.c, fat: a.fat + f.fat };
    }, { kcal: 0, p: 0, c: 0, fat: 0 });

    // Get targets for that day of week
    var dayKeys = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
    var T = DAY_TARGETS[dayKeys[d.getDay()]] || DAY_TARGETS.MON;

    if (i === 0 || foods.length > 0) {
      found = true;
      var kcalPct = Math.min(100, Math.round(tot.kcal / T.kcal * 100));
      var pPct = Math.min(100, Math.round(tot.p / T.p * 100));
      var kcalCol = tot.kcal >= T.kcal * 0.9 && tot.kcal <= T.kcal * 1.1 ? '#c8f135' : (tot.kcal < T.kcal * 0.9 ? '#f7a07e' : '#ff4d4d');
      var pCol = tot.p >= T.p * 0.9 ? '#7eb8f7' : '#f7a07e';

      html += '<div class="card" style="margin-bottom:10px">';
      html += '<div class="card-header" style="margin-bottom:8px">';
      html += '<div><div class="card-title" style="font-size:18px">' + dayName + '</div></div>';
      html += '<div style="text-align:right">';
      html += '<div style="font-family:Bebas Neue,sans-serif;font-size:22px;color:' + kcalCol + '">' + Math.round(tot.kcal) + '<span style="font-size:12px;color:#555"> / ' + T.kcal + ' kcal</span></div>';
      html += '</div></div>';

      // Macro bars
      html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:8px">';
      var macros = [
        { label: 'P', val: Math.round(tot.p), target: T.p, unit: 'g', col: '#7eb8f7' },
        { label: 'C', val: Math.round(tot.c), target: T.c, unit: 'g', col: '#f7a07e' },
        { label: 'F', val: Math.round(tot.fat), target: T.f, unit: 'g', col: '#c4a0f7' }
      ];
      html += '<div style="background:#1a1a1a;border-radius:8px;padding:6px;text-align:center">';
      html += '<div style="font-family:monospace;font-size:8px;color:#555;text-transform:uppercase">Protein</div>';
      html += '<div style="font-family:Bebas Neue,sans-serif;font-size:18px;color:' + pCol + '">' + Math.round(tot.p) + 'g</div>';
      html += '<div style="font-family:monospace;font-size:8px;color:#555">/ ' + T.p + 'g</div></div>';

      html += '<div style="background:#1a1a1a;border-radius:8px;padding:6px;text-align:center">';
      html += '<div style="font-family:monospace;font-size:8px;color:#555;text-transform:uppercase">Carbs</div>';
      html += '<div style="font-family:Bebas Neue,sans-serif;font-size:18px;color:#f7a07e">' + Math.round(tot.c) + 'g</div>';
      html += '<div style="font-family:monospace;font-size:8px;color:#555">/ ' + T.c + 'g</div></div>';

      html += '<div style="background:#1a1a1a;border-radius:8px;padding:6px;text-align:center">';
      html += '<div style="font-family:monospace;font-size:8px;color:#555;text-transform:uppercase">Fat</div>';
      html += '<div style="font-family:Bebas Neue,sans-serif;font-size:18px;color:#c4a0f7">' + Math.round(tot.fat) + 'g</div>';
      html += '<div style="font-family:monospace;font-size:8px;color:#555">/ ' + T.f + 'g</div></div>';

      html += '<div style="background:#1a1a1a;border-radius:8px;padding:6px;text-align:center">';
      html += '<div style="font-family:monospace;font-size:8px;color:#555;text-transform:uppercase">Target</div>';
      html += '<div style="font-family:Bebas Neue,sans-serif;font-size:18px;color:' + kcalCol + '">' + kcalPct + '%</div>';
      html += '<div style="font-family:monospace;font-size:8px;color:#555">hit</div></div>';

        });

      html += '</div>';
    }
  }

  if (!found) html = '<div class="empty-state">No nutrition logged yet</div>';
  list.innerHTML = html;
}

function buildNutritionDayText(dateKey, foods, tot, T) {
  var d = new Date(dateKey);
  var dayName = d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
  var kcalPct = Math.round(tot.kcal / T.kcal * 100);
  var lines = [
    'NUTRITION LOG — ' + dayName,
    '-----------------------------',
    'Calories: ' + Math.round(tot.kcal) + ' / ' + T.kcal + ' kcal (' + kcalPct + '% of target)',
    'Protein:  ' + Math.round(tot.p) + 'g / ' + T.p + 'g',
    'Carbs:    ' + Math.round(tot.c) + 'g / ' + T.c + 'g',
    'Fat:      ' + Math.round(tot.fat) + 'g / ' + T.f + 'g',
    ''
  ];
  if (foods.length) {
    lines.push('FOODS LOGGED:');
    foods.forEach(function(f) {
      lines.push('  ' + f.name + ' — ' + f.kcal + 'kcal | P' + f.p + 'g | C' + f.c + 'g | F' + f.fat + 'g');
    });
  } else {
    lines.push('No foods logged this day.');
  }
  return lines.join('\n');
}

function exportNutritionDay(dateKey) {
  var log = getNutritionLog();
  var foods = log[dateKey] || [];
  var tot = foods.reduce(function(a, f) { return { kcal: a.kcal+f.kcal, p: a.p+f.p, c: a.c+f.c, fat: a.fat+f.fat }; }, { kcal:0, p:0, c:0, fat:0 });
  var d = new Date(dateKey);
  var dayKeys = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  var T = DAY_TARGETS[dayKeys[d.getDay()]] || DAY_TARGETS.MON;
  var text = buildNutritionDayText(dateKey, foods, tot, T);
  copyToClipboard(text, 'Day copied! Paste into Claude');
}

function exportNutritionWeek() {
  var log = getNutritionLog();
  var today = new Date();
  var lines = ['NUTRITION WEEKLY REPORT — Last 7 Days', '=====================================', ''];
  for (var i = 0; i < 7; i++) {
    var d = new Date(today);
    d.setDate(today.getDate() - i);
    var dateKey = d.toISOString().split('T')[0];
    var foods = log[dateKey] || [];
    var tot = foods.reduce(function(a, f) { return { kcal: a.kcal+f.kcal, p: a.p+f.p, c: a.c+f.c, fat: a.fat+f.fat }; }, { kcal:0, p:0, c:0, fat:0 });
    var dayKeys = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
    var T = DAY_TARGETS[dayKeys[d.getDay()]] || DAY_TARGETS.MON;
    var kcalPct = Math.round(tot.kcal / T.kcal * 100);
    var dayName = d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
    lines.push(dayName + ' — ' + Math.round(tot.kcal) + '/' + T.kcal + 'kcal (' + kcalPct + '%) | P' + Math.round(tot.p) + 'g | C' + Math.round(tot.c) + 'g | F' + Math.round(tot.fat) + 'g');
    if (foods.length) {
      foods.forEach(function(f) { lines.push('  · ' + f.name + ' (' + f.kcal + 'kcal)'); });
    } else {
      lines.push('  · Nothing logged');
    }
    lines.push('');
  }
  lines.push('Paste into Claude and ask for a nutrition review!');
  copyToClipboard(lines.join('\n'), 'Week copied! Paste into Claude');
}

function exportNutritionFull() {
  var log = getNutritionLog();
  var today = new Date();
  var lines = ['NUTRITION 14-DAY REPORT', '=======================', ''];
  for (var i = 0; i < 14; i++) {
    var d = new Date(today);
    d.setDate(today.getDate() - i);
    var dateKey = d.toISOString().split('T')[0];
    var foods = log[dateKey] || [];
    var tot = foods.reduce(function(a, f) { return { kcal: a.kcal+f.kcal, p: a.p+f.p, c: a.c+f.c, fat: a.fat+f.fat }; }, { kcal:0, p:0, c:0, fat:0 });
    var dayKeys = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
    var T = DAY_TARGETS[dayKeys[d.getDay()]] || DAY_TARGETS.MON;
    var kcalPct = Math.round(tot.kcal / T.kcal * 100);
    var dayName = d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
    if (foods.length > 0) {
      lines.push(dayName + ' — ' + Math.round(tot.kcal) + '/' + T.kcal + 'kcal (' + kcalPct + '%) | P' + Math.round(tot.p) + 'g | C' + Math.round(tot.c) + 'g | F' + Math.round(tot.fat) + 'g');
      foods.forEach(function(f) { lines.push('  · ' + f.name + ' (' + f.kcal + 'kcal, P' + f.p + 'g, C' + f.c + 'g, F' + f.fat + 'g)'); });
      lines.push('');
    }
  }
  lines.push('Paste into Claude and ask for a full nutrition review!');
  copyToClipboard(lines.join('\n'), '14 days copied! Paste into Claude');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

initWorkout();
